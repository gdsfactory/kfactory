site_name: KFactory
repo_url: https://github.com/gdsfactory/kfactory
site_url: https://gdsfactory.github.io/kfactory
docs_dir: source

nav:
  - Home:
      - Intro: index.md
      - gdsfactory.md
  - Getting Started:
      - Prerequisites: getting_started/prerequisites.md
      - Installation: getting_started/installation.md
      - 5-Minute Quickstart: getting_started/quickstart.py
      - KLive Setup: getting_started/klive_setup.md
  - Core Concepts:
      - KCell: concepts/kcell.py
      - Layers: concepts/layers.py
      - Ports: concepts/ports.py
      - Instances: concepts/instances.py
      - Geometry: concepts/geometry.py
      - KCLayout: concepts/kclayout.py
      - DBU vs µm: concepts/dbu_vs_um.py
  - Routing:
      - Overview: routing/overview.py
      - Optical: routing/optical.py
      - Electrical: routing/electrical.py
      - Manhattan Primitives: routing/manhattan.py
      - All-Angle: routing/all_angle.py
      - Bundle Reference: routing/bundle.py
      - Path-Length Matching: routing/path_length.py
  - Components:
      - Overview: components/overview.py
      - Straight Waveguide: components/straight.py
      - Euler Bends: components/euler.py
      - Circular Bends: components/circular.py
      - Taper: components/taper.py
      - Bezier S-Bends: components/bezier.py
      - Virtual Cells (VKCell): components/virtual.py
      - Parameterized Cells: components/pcells.py
      - Factory Functions: components/factories.py
  - Enclosures:
      - Cross-Sections: enclosures/cross_sections.py
      - Layer Enclosure: enclosures/layer_enclosure.py
      - KCell Enclosure: enclosures/kcell_enclosure.py
  - Utilities:
      - Grid Layout: utilities/grid.py
      - DRC Fixing: utilities/drc_fix.py
      - Packing: utilities/packing.py
      - Regression Testing: utilities/difftest.py
      - Fill: utilities/fill.py
      - Session Cache: utilities/session_cache.py
  - PDK:
      - Creating a PDK: pdk/creating_pdk.py
      - Technology & Layer Stack: pdk/technology.py
  - Schematics:
      - Overview: schematics/overview.py
      - Netlist & I/O: schematics/netlist.py
      - 45° Crossing: schematics/crossing45.py
  - How-To Guides:
      - Best Practices: howto/best_practices.py
      - Common Patterns: howto/patterns.py
      - FAQ: howto/faq.md
      - Contributing: howto/contributing.md
  - Migration: migration.md
  - Config Class: config.md
  - API: reference/
  - Changelog: changelog.md
theme:
  name: "material"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  custom_dir: overrides

  palette:
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
watch:
  - ../src/kfactory

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tabbed
  - pymdownx.emoji
  - pymdownx.snippets:
      check_paths: true

plugins:
  - gen-files:
      scripts:
        - scripts/gen_diagrams.py
        - scripts/gen_ref_pages.py
  - mkdocstrings:
      enabled: true
      # custom_templates: templates
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            allow_inspection: true
            docstring_style: google
            # ignore_init_summary: true
            separate_signature: true
            show_signature_annotations: true
            members_order: alphabetical
            extensions:
              - griffe_pydantic
              - dataclasses
              - griffe_inherited_docstrings
              - griffe_warnings_deprecated
  - mkdocs-video:
      is_video: true
      video_type: webm
      video_muted: true
  - search
  - mkdocs-jupyter:
      include_source: true
      # ignore_h1_titles: true
      include_requirejs: true
      execute: true
      allow_errors: false
      kernel_name: python3
      execute_ignore:
        - "source/*.py"
      ignore: ["source/*.py"]
      remove_tag_config:
        remove_input_tags:
          - hide
        remove_output_tags:
          - hide
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - markdown-exec
