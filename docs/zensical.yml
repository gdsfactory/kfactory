      # The "API" sub-tree is auto-generated and spliced in at build time
      # by docs/scripts/build_docs_source.py — DO NOT enumerate modules
      # here manually. Edit `gen_api_reference` to change the structure.
      - API: reference/   # SPLICE_API
      - Config Class: config.md
      - Migration: migration.md
      - Changelog: changelog.md
theme:
  name: "material"
  logo: _static/logo.svg
  favicon: _static/logo.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  custom_dir: overrides

  palette:
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# Multi-version docs via mike (zensical fork). The CI workflow deploys
# `main` → dev alias and tagged releases → <version> + latest alias.
# https://zensical.org/docs/setup/versioning/
extra:
  version:
    provider: mike
    default: latest

watch:
  - ../src/kfactory

markdown_extensions:
  - admonition
  - attr_list                         # required for {.md-button} and {.lg .middle}
  - md_in_html                        # required for grid-card <div markdown> blocks
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tabbed
  - pymdownx.emoji:
      # Render :material-foo: / :fontawesome-foo: as inline SVG via
      # zensical's bundled twemoji index.
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
  - pymdownx.snippets:
      check_paths: true

plugins:
  - mkdocstrings:
      enabled: true
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            allow_inspection: true
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            members_order: alphabetical
            # Submodules are exposed via the literate-nav side panel, not
            # inlined on the parent package page. Keeps the right-side
            # "On this page" TOC focused on actual class / function /
            # variable definitions in the current module.
            show_submodules: false
            show_root_heading: true
            show_root_full_path: false
            extensions:
              - griffe_pydantic
              - dataclasses
              - griffe_inherited_docstrings
              - griffe_warnings_deprecated
  - mkdocs-video:
      is_video: true
      video_type: webm
      video_muted: true
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
