name: docs

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  test_docs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version:
          - "3.13"
        os: [ubuntu-latest]

    steps:
      - name: Install graphviz
        shell: bash -l {0}
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt install graphviz graphviz-dev
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - uses: extractions/setup-just@v3
      - name: Cache executed notebooks
        uses: actions/cache@v4
        with:
          path: |
            docs/.build-cache
            docs/source-built
          key: docs-source-built-${{ matrix.python-version }}-${{ hashFiles('docs/source/**/*.py', 'docs/source/**/*.md', 'src/kfactory/**/*.py', 'docs/scripts/build_docs_source.py') }}
          restore-keys: |
            docs-source-built-${{ matrix.python-version }}-
      - name: Build docs
        run: just docs
